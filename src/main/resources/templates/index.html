<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Front page</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../public/css/styles.css"
          th:href="@{/css/styles.css}">

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@300;400;600&display=swap"
          rel="stylesheet">

    <!-- JavaScript -->
    <script src="../public/js/script.js"
            th:src="@{/js/script.js}"
            defer></script>
</head>


<body>

Olsker Cupcakes

<form method="post" action="/add-to-cart" class="order-line">

    <select id="bottom" name="bottom" required>
        <option value="" disabled selected>Vælg bund</option>
        <option th:each="bottom : ${bottoms}"
                th:value="${bottom.id}"
                th:data-price="${bottom.price}"
                th:text="${bottom.name + ' (' + bottom.price + ' g)'}">
        </option>
    </select>

    <select id="topping" name="topping" required>
        <option value="" disabled selected>Vælg topping</option>
        <option th:each="topping : ${toppings}"
                th:value="${topping.id}"
                th:data-price="${topping.price}"
                th:text="${topping.name + ' (' + topping.price + ' g)'}">
        </option>
    </select>

    <label for="quantity">Antal</label>
    <input type="number" id="quantity" name="quantity" min="1" value="1" required>

    <span id="line-price">Pris: 0 g</span>

    <button type="submit">Læg i kurv</button>

</form>


<!--KRÆVER ROUTE-->
<a th:href="@{/login}">
    <button type="button">LOG PÅ</button>
</a>



</body>

</html>
