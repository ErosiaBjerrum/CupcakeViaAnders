<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Front page</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../public/css/styles.css"
          th:href="@{/css/styles.css}">

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@300;400;600&display=swap"
          rel="stylesheet">

    <!-- JavaScript -->
    <script src="../public/js/script.js"
            th:src="@{/js/script.js}"
            defer></script>
</head>

<body>


<h1>Velkommen!</h1>
<h2>Venligst log ind.</h2>

<form method="post" action="/login">

    <div>
        <label for="username">Brugernavn</label>
        <input type="text" id="username" name="username" th:value="${username}">
    </div>

    <div>
        <label for="password">Adgangskode</label>
        <input type="password" id="password" name="password">
    </div>

    <div>
        <button type="submit">LOG PÅ</button>
    </div>

    <div>
        <a href="/create_user">
            <button type="button">OPRET BRUGER</button>
        </a>
    </div>

</form>

</body>

</html>
